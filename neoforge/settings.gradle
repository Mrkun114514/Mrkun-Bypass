plugins {
    // 让 Gradle 自动下载 JDK 21 工具链
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.9.0'
}

pluginManagement {
    repositories {
        gradlePluginPortal()
        maven { url 'https://maven.neoforged.net/releases/' }
        mavenCentral()
    }
}

rootProject.name = 'mrkun-bypass-neoforge'
